name: publish

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  publish:
    name: Ensure GitHub Release for pushed version tag
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Verify tag
        run: |
          if ! [[ ${{ github.ref }} =~ ^refs/tags/[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "ERR: Invalid publish version tag: ${{ github.ref }}"
            exit 1
          fi

      - name: Get version
        id: get-version
        run: echo "version=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Get comment
        id: get-comment
        run: |
          readonly local releaseCommentPrependBody="$( git tag -l ${{ env.version }} --format '%(contents)' )"
          if (( $(grep -c . <<<"${releaseCommentPrependBody// }") > 1 )); then
            {
              echo 'releaseCommentPrependBody<<EOF'
              echo "$releaseCommentPrependBody"
              echo EOF
            } >> "$GITHUB_ENV"
          fi

      # Note that when a release already exists for the tag, only files will be uploaded and lets this act as a
      # fallback to ensure that a real GitHub release is created for the tag.
      - name: Create release and upload artifacts in the same step
        uses: softprops/action-gh-release@v3
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          name: "[RELEASE] ${{ env.version }}"
          body: "${{ env.releaseCommentPrependBody }}"
          generate_release_notes: true
          files: |
            LICENSE
          fail_on_unmatched_files: true
